name: Deploy React Website

on:
  push:
    branches: [ master ]   # Trigger on push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # Use your project's Node version
          cache: 'npm'

      # 3. Install dependencies and build the React app
      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build   # Creates 'build' folder (or 'dist' - adjust as needed)

      # 4. Deploy to server using rsync over SSH
      - name: Deploy to server
        uses: burnett01/rsync-deployments@7.0.1   # A popular rsync action
        with:
          switches: -avz --delete   
          path: dist/              
          remote_path: /home/ubuntu/reliablebuses/website
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}