

name: Deploy React Website

on:
  push:
    branches: [ master ]   # Trigger on push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # Use your project's Node version
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Create .env file
        run: |
          echo "VITE_BUS_PROJECT_URL=${{ secrets.VITE_BUS_PROJECT_URL }}" >> .env
          echo "VITE_BUS_PROJECT_KEY=${{ secrets.VITE_BUS_PROJECT_KEY }}" >> .env


      # Install dependencies and build the React app
      - name: Install dependencies
        working-directory: ./website
        run: npm ci

      - name: Build React app
        working-directory: ./website
        run: npm run build   # Creates 'build' folder (or 'dist' - adjust as needed)

      # Deploy to server using rsync over SSH
      - name: Deploy to server
        uses: burnett01/rsync-deployments@7.0.1   # A popular rsync action
        with:
          switches: -avz --delete   
          path: website/dist/              
          remote_path: /home/ubuntu/reliablebuses/website
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}